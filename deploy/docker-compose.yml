# Local development stack for Musibot.
#
# Brings up the infrastructure services that Musibot's own services connect to.
# The Musibot services themselves (api, orchestrators, workers) are NOT started
# here — you run them from your IDE or shell against this stack, which is what
# you want while developing them. See ./README.md.

name: musibot

services:

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"    # AMQP, for Musibot services
      - "15672:15672"  # management web UI, http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"  # S3 API, for Musibot services and for presigned URLs
      - "9001:9001"  # console web UI, http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: creates the single global bucket that holds all Musicorpus pages.
  # Exits immediately after; a stopped `minio-init` container is expected.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set musibot http://minio:9000 root password &&
      mc mb --ignore-existing musibot/musibot-pages
      "

volumes:
  rabbitmq-data:
  minio-data:
